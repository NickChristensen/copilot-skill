version: 1
service: copilot-money
auth:
  type: bearer_jwt
  bearer_header: Authorization
  bearer_format: "Bearer <ID_TOKEN>"
  graphql_endpoint: https://app.copilot.money/api/graphql

firebase_secure_token:
  endpoint: https://securetoken.googleapis.com/v1/token
  method: POST
  query:
    key: "${COPILOT_API_KEY}"
  headers:
    content-type: application/x-www-form-urlencoded
  body_form:
    grant_type: refresh_token
    refresh_token: "${COPILOT_REFRESH_TOKEN}"
  success_fields:
    - id_token
    - refresh_token
    - expires_in

lifecycle:
  id_token_ttl_seconds: 3600
  refresh_buffer_seconds: 60
  refresh_token_rotation: true
  recommended_behavior:
    - refresh token before expiry buffer
    - persist newest refresh_token after each successful refresh
    - retry transient failures with exponential backoff
    - treat 400/401 refresh failures as re-auth required

security_notes:
  - never log id_token, refresh_token, or full authorization headers
  - treat refresh_token as long-lived secret
